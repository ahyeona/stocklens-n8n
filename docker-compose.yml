services:
  n8n:
    image: n8nio/n8n:latest
    container_name: stocklens-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=stocklens1234
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - DART_API_KEY=5c9accf36ccce63a5649ee91522e9c726b4aff01
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
    depends_on:
      - fileserver

  fileserver:
    image: halverneus/static-file-server:latest
    container_name: stocklens-fileserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/web
    environment:
      - FOLDER=/web

volumes:
  n8n_data:
